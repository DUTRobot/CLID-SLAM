setting:
  name: "ncd128math_easy_ours_slam"
  tracking_method: "ours"
  mapping_method: "ours"
  output_root: "./test"
  imu_path: "/home/uav/myproject/PIN_SLAM/dataset/ncd128/collection3/easy/sequences/imu"
  pc_path: "/home/uav/myproject/PIN_SLAM/dataset/ncd128/collection3/easy/sequences/lidar"
  pose_ts_path: "/home/uav/myproject/PIN_SLAM/dataset/ncd128/collection3/easy/sequences/pose_ts.txt"
  deskew: True

process:
  min_range_m: 1.5
  max_range_m: 60
  min_z_m: -10.0
  vox_down_m: 0.05
  adaptive_range_on: True
  dynamic_filter_on: True
sampler:
  surface_sample_range_m: 0.3
  surface_sample_n: 4
  free_sample_begin_ratio: 0.6
  free_front_sample_n: 6
neuralpoints:
  voxel_size_m: 0.2
  num_nei_cells: 2
  search_alpha: 0.5
  weighted_first: True
  prune_map_on: True
loss:
  sigma_sigmoid_m: 0.1
  loss_weight_on: True
  dist_weight_scale: 0.4
continual:
  batch_size_new_sample: 1000
  pool_capacity: 2e7
tracker:
  measurement_noise_covariance: 0.01
  bias_noise_covariance: 0.0001
  source_vox_down_m: 0.4
  iter_n: 50
  valid_nn_k: 4
  T_imu_lidar:
    - [ 1.0,   0,    0,  0.014 ]
    - [   0, 1.0,    0, -0.012 ]
    - [   0,   0,  1.0, -0.015 ]
    - [   0,   0,    0,    1.0 ]

optimizer:
  iters: 30
  learning_rate: 0.01
  batch_size: 16384
  adaptive_iters: True
eval:
  wandb_vis_on: False # log to wandb or not
  o3d_vis_on: False # visualize the mapping or not
  silence_log: True
  mesh_min_nn: 15
  save_map: True