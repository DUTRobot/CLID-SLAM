setting:
  name: "02_ours_slam"
  tracking_method: "ours"
  mapping_method: "ours"
  output_root: "./ncd"
  imu_path: "./dataset/newer_college/02_long_experiment/sequences/imu"
  pc_path: "./dataset/newer_college/02_long_experiment/sequences/lidar"
  pose_ts_path: "./dataset/newer_college/02_long_experiment/sequences/pose_ts.txt"
  deskew: True
  begin_frame: 500
  end_frame: 1800

process:
  min_range_m: 1.5
  max_range_m: 60
  min_z_m: -10.0
  vox_down_m: 0.05
  adaptive_range_on: True
  dynamic_filter_on: True

sampler:
  surface_sample_range_m: 0.25
  surface_sample_n: 4
  free_sample_begin_ratio: 0.6
  free_front_sample_n: 6

neuralpoints:
  voxel_size_m: 0.2
  num_nei_cells: 2
  search_alpha: 0.5
  weighted_first: True
  prune_map_on: False

loss:
  sigma_sigmoid_m: 0.05
  loss_weight_on: True
  dist_weight_scale: 0.4
#  ekional_loss_on: True
#  weight_e: 0.5

continual:
  batch_size_new_sample: 1000
  pool_capacity: 1e8

tracker:
  measurement_noise_covariance: 0.01
  bias_noise_covariance: 0.0001
  source_vox_down_m: 0.4
  iter_n: 50
  valid_nn_k: 4
  T_imu_lidar:
    - [ -1.0,      0,   0,   -0.006253]
    - [    0,   -1.0,   0,    0.011775]
    - [    0,      0, 1.0,   -0.028535]
    - [    0,      0,   0,           1]

optimizer:
  iters: 20
  learning_rate: 0.01
  batch_size: 16384
  adaptive_iters: True
  
eval:
  wandb_vis_on: False # log to wandb or not
  o3d_vis_on: False # visualize the mapping or not
  silence_log: True
  mesh_min_nn: 15
  save_map: True